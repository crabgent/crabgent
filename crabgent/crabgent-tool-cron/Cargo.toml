[package]
name = "crabgent-tool-cron"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Cron CRUD tool: a Tool exposing create/list/get/update/delete operations over a CronStore, gated by a PolicyHook on typed Action::Cron* variants."

[lints]
workspace = true

[dependencies]
crabgent-core.workspace = true
crabgent-cron.workspace = true
crabgent-log.workspace = true
crabgent-store.workspace = true
async-trait.workspace = true
chrono.workspace = true
serde = { workspace = true }
serde_json.workspace = true

[dev-dependencies]
crabgent-store = { workspace = true, features = ["memory"] }
tokio = { workspace = true, features = ["macros", "rt", "rt-multi-thread"] }
