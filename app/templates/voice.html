<!doctype html>
<html lang="de" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="referrer" content="no-referrer">
<title>crabgent :: voice</title>
<link rel="preconnect" href="https://fonts.bunny.net">
<link href="https://fonts.bunny.net/css?family=ibm-plex-mono:400,500,600,700|martian-mono:700,800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0b0e;
  --bg-deep: #060708;
  --panel: #111319;
  --panel-2: #161922;
  --panel-3: #1b1f2a;
  --border: #242a35;
  --border-hot: #364050;
  --text: #d8d4c6;
  --bright: #f4f1e7;
  --muted: #7b8292;
  --dim: #4b5263;
  --claw: #ff5b2c;
  --claw-soft: #ff7b50;
  --danger: #ff4545;
  --success: #7fd17a;
  --listen: #4fc4d7;
  --mono: 'IBM Plex Mono', 'JetBrains Mono', 'SF Mono', 'Menlo', monospace;
  --display: 'Martian Mono', 'IBM Plex Mono', monospace;
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  min-height: 100%;
  background:
    radial-gradient(1100px 540px at 14% -10%, rgba(255, 91, 44, 0.07), transparent 60%),
    radial-gradient(900px 480px at 90% 112%, rgba(79, 196, 215, 0.05), transparent 55%),
    var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(216, 212, 198, 0.030) 1px, transparent 1px),
    linear-gradient(90deg, rgba(216, 212, 198, 0.022) 1px, transparent 1px);
  background-size: 34px 34px;
  -webkit-mask-image: radial-gradient(ellipse 130% 100% at 50% 0%, black 25%, transparent 80%);
  mask-image: radial-gradient(ellipse 130% 100% at 50% 0%, black 25%, transparent 80%);
  z-index: 0;
}
body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: 0.14;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.55  0 0 0 0 0.55  0 0 0 0 0.55  0 0 0 0.6 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  z-index: 1000;
  mix-blend-mode: overlay;
}
button, input, select, textarea { font: inherit; }
::selection { background: var(--claw); color: var(--bg); }
::-webkit-scrollbar { width: 9px; height: 9px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border: 2px solid var(--bg); border-radius: 5px; }
::-webkit-scrollbar-thumb:hover { background: var(--claw); }

@keyframes rise {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: none; }
}
@keyframes breathe {
  0%, 100% { box-shadow: 0 0 0 0 rgba(79, 196, 215, 0.35); }
  50% { box-shadow: 0 0 0 5px rgba(79, 196, 215, 0); }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; }
}

.app { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }

.masthead {
  position: sticky;
  top: 0;
  z-index: 50;
  background: color-mix(in srgb, var(--bg) 84%, transparent);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: stretch;
  justify-content: space-between;
  gap: 18px;
  flex-wrap: wrap;
  animation: rise 0.3s ease-out both;
}
.mark {
  font-family: var(--display);
  font-weight: 800;
  letter-spacing: 0.03em;
  font-size: 14px;
  color: var(--bright);
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 13px 0;
}
.mark::before {
  content: "\27a4\27a4";
  color: var(--claw);
  letter-spacing: -0.12em;
  text-shadow: 0 0 14px rgba(255, 91, 44, 0.6);
}
.right { display: flex; gap: 2px; align-items: stretch; flex-wrap: wrap; }
.nav {
  position: relative;
  display: flex;
  align-items: center;
  color: var(--muted);
  text-decoration: none;
  padding: 0 13px;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  transition: color 0.15s, background 0.15s;
}
.nav:hover { color: var(--bright); background: rgba(216, 212, 198, 0.04); }
.nav.active { color: var(--claw); }
.nav.active::after {
  content: "";
  position: absolute;
  left: 10px;
  right: 10px;
  bottom: -1px;
  height: 2px;
  background: var(--claw);
  box-shadow: 0 0 10px rgba(255, 91, 44, 0.7);
}
.nav.logout { color: var(--dim); }
.nav.logout:hover { color: var(--danger); background: rgba(255, 69, 69, 0.06); }

.work {
  width: 100%;
  max-width: 1320px;
  margin: 0 auto;
  padding: 20px 24px 28px;
  display: grid;
  grid-template-columns: minmax(300px, 360px) minmax(0, 1fr);
  gap: 16px;
}
.panel {
  border: 1px solid var(--border);
  background: linear-gradient(180deg, var(--panel-2), var(--panel));
  box-shadow: 0 20px 50px -30px rgba(0, 0, 0, 0.9);
  position: relative;
}
.panel::before {
  content: "";
  position: absolute;
  top: -1px;
  left: -1px;
  width: 18px;
  height: 18px;
  border-top: 2px solid var(--claw);
  border-left: 2px solid var(--claw);
  pointer-events: none;
  z-index: 1;
}
.control {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  animation: rise 0.35s 0.05s ease-out both;
}
.field label,
.section-label {
  display: block;
  color: var(--muted);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 5px;
}
.field select,
.field textarea,
.field input {
  width: 100%;
  border: 1px solid var(--border);
  background: var(--bg-deep);
  color: var(--text);
  padding: 8px 10px;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.field select:focus,
.field textarea:focus,
.field input:focus {
  border-color: var(--claw);
  box-shadow: 0 0 0 1px rgba(255, 91, 44, 0.25);
}
.field select {
  appearance: none;
  cursor: pointer;
  padding-right: 24px;
  background-image: linear-gradient(45deg, transparent 50%, var(--muted) 50%), linear-gradient(135deg, var(--muted) 50%, transparent 50%);
  background-position: calc(100% - 12px) 50%, calc(100% - 8px) 50%;
  background-size: 4px 4px;
  background-repeat: no-repeat;
}
.field textarea { min-height: 94px; resize: vertical; }
.field textarea::placeholder, .field input::placeholder { color: var(--dim); }
.settings-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
  gap: 10px;
}
.speaker-custom[hidden] { display: none !important; }
.switchline {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 10px 12px;
  border: 1px solid var(--border);
  background: var(--bg-deep);
  cursor: pointer;
  transition: border-color 0.15s;
}
.switchline:hover { border-color: var(--border-hot); }
.switchline span {
  color: var(--text);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.switchline input { width: 18px; height: 18px; accent-color: var(--claw); cursor: pointer; }
.meter {
  height: 14px;
  border: 1px solid var(--border);
  background: var(--bg-deep);
  overflow: hidden;
  position: relative;
}
.meter::after {
  content: "";
  position: absolute;
  inset: 0;
  background-image: repeating-linear-gradient(90deg, transparent 0 11px, rgba(6, 7, 8, 0.55) 11px 13px);
  pointer-events: none;
}
.meter > div {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, color-mix(in srgb, var(--listen) 45%, var(--bg-deep)), var(--listen));
  box-shadow: 0 0 12px rgba(79, 196, 215, 0.5);
  transition: width 80ms linear;
}
.buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.btn {
  border: 1px solid var(--border);
  background: var(--panel-3);
  color: var(--text);
  min-height: 48px;
  padding: 8px 12px;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-size: 12px;
  font-weight: 500;
  transition: color 0.15s, border-color 0.15s, background 0.15s, box-shadow 0.15s;
}
.btn:hover {
  border-color: var(--claw);
  color: var(--claw);
  box-shadow: 0 0 0 1px rgba(255, 91, 44, 0.2);
}
.btn:disabled { opacity: 0.42; cursor: not-allowed; }
.btn-main { border-color: var(--listen); color: var(--listen); }
.btn-main:hover {
  border-color: var(--listen);
  color: var(--listen);
  box-shadow: 0 0 0 1px rgba(79, 196, 215, 0.3), 0 4px 20px -8px rgba(79, 196, 215, 0.6);
}
.btn-main.active {
  background: var(--listen);
  color: var(--bg-deep);
  animation: breathe 2.2s ease-in-out infinite;
}
.btn-stop { border-color: color-mix(in srgb, var(--danger) 55%, transparent); color: var(--danger); }
.btn-stop:hover {
  background: var(--danger);
  border-color: var(--danger);
  color: var(--bg-deep);
  box-shadow: 0 0 0 1px rgba(255, 69, 69, 0.3);
}
.btn-record { border-color: var(--claw); color: var(--claw); }
.btn-record:hover { background: var(--claw); color: var(--bg-deep); }
.btn[hidden],
input[hidden] { display: none !important; }
.status {
  border: 1px solid var(--border);
  border-left: 2px solid var(--dim);
  background: var(--bg-deep);
  padding: 10px 12px;
  min-height: 42px;
  color: var(--muted);
  font-size: 12px;
}
.status b { color: var(--text); font-weight: normal; }
.stage {
  display: grid;
  grid-template-rows: auto 1fr;
  min-height: calc(100vh - 132px);
  animation: rise 0.4s 0.1s ease-out both;
}
.signal {
  border-bottom: 1px solid var(--border);
  padding: 14px 16px;
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
}
.stat {
  border: 1px solid var(--border);
  background: var(--bg-deep);
  padding: 9px 12px;
  min-height: 56px;
  position: relative;
}
.stat::before {
  content: "";
  position: absolute;
  top: 9px;
  right: 9px;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--dim);
  box-shadow: 0 0 6px color-mix(in srgb, var(--dim) 70%, transparent);
}
.stat:first-child::before {
  background: var(--listen);
  box-shadow: 0 0 8px rgba(79, 196, 215, 0.7);
}
.stat-label {
  color: var(--muted);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}
.stat-value {
  margin-top: 5px;
  font-family: var(--display);
  font-weight: 700;
  font-size: 15px;
  color: var(--bright);
  word-break: break-word;
}
.conversation {
  padding: 16px;
  overflow-y: auto;
  min-height: 420px;
  max-height: calc(100vh - 226px);
}
.line {
  border-left: 2px solid var(--border);
  background: color-mix(in srgb, var(--bg-deep) 70%, transparent);
  padding: 10px 13px;
  margin-bottom: 10px;
  white-space: pre-wrap;
  word-break: break-word;
  animation: rise 0.25s ease-out both;
}
.line.user { border-left-color: var(--listen); }
.line.agent { border-left-color: var(--claw); }
.line.system { color: var(--muted); }
.role {
  color: var(--muted);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 4px;
  display: flex;
  justify-content: space-between;
  gap: 10px;
}
.role .time { color: var(--dim); letter-spacing: 0.04em; }
.line.user .role { color: var(--listen); }
.line.agent .role { color: var(--claw); }
.transcript-live {
  color: var(--muted);
  min-height: 22px;
}
.err { color: var(--danger); }
.ok { color: var(--success); }

.overlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(6, 7, 8, 0.6);
  backdrop-filter: blur(5px);
  -webkit-backdrop-filter: blur(5px);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 14vh;
}
.overlay[hidden] { display: none; }
.overlay-box {
  background: linear-gradient(180deg, var(--panel-3), var(--panel-2));
  border: 1px solid var(--border-hot);
  box-shadow: 0 40px 120px -30px rgba(0, 0, 0, 0.95);
  width: min(520px, 92vw);
  position: relative;
}
.overlay-box::before {
  content: "";
  position: absolute;
  top: -1px;
  left: -1px;
  width: 18px;
  height: 18px;
  border-top: 2px solid var(--claw);
  border-left: 2px solid var(--claw);
  pointer-events: none;
}
.palette input {
  width: 100%;
  background: transparent;
  border: 0;
  border-bottom: 1px solid var(--border);
  padding: 14px 16px;
  color: var(--bright);
  font-family: var(--mono);
  font-size: 14px;
  outline: none;
}
.palette input::placeholder { color: var(--dim); }
.palette-list { max-height: 320px; overflow-y: auto; padding: 6px; }
.palette-item {
  padding: 9px 12px;
  color: var(--muted);
  cursor: pointer;
  font-size: 12px;
  letter-spacing: 0.04em;
}
.palette-item.sel, .palette-item:hover {
  background: var(--panel);
  color: var(--claw);
  box-shadow: inset 2px 0 0 var(--claw);
}
.palette-empty { padding: 14px; color: var(--dim); font-size: 12px; }
.cheat { padding: 18px 20px; }
.cheat h3 {
  margin: 0 0 14px;
  font-family: var(--display);
  font-size: 12px;
  color: var(--claw);
  text-transform: uppercase;
  letter-spacing: 0.14em;
}
.cheat-grid {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 10px 18px;
  font-size: 12px;
  color: var(--muted);
  align-items: center;
}
kbd {
  display: inline-block;
  border: 1px solid var(--border-hot);
  background: var(--bg-deep);
  padding: 1px 6px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text);
  border-radius: 3px;
  box-shadow: 0 2px 0 rgba(0, 0, 0, 0.4);
}
@media (max-width: 760px) {
  .masthead { padding: 0 14px; }
  .right { gap: 0; }
  .nav { padding: 0 9px; }
  .work {
    padding: 12px;
    grid-template-columns: 1fr;
  }
  .stage { min-height: 56vh; }
  .signal { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .settings-grid { grid-template-columns: 1fr; }
  .conversation {
    min-height: 320px;
    max-height: none;
  }
  .buttons { grid-template-columns: 1fr; }
  .btn { min-height: 54px; }
}
</style>
</head>
<body>
<div class="app">
  <div class="masthead">
    <span class="mark">crabgent</span>
    <div class="right">
      <a class="nav" href="/admin">memory</a>
      <a class="nav" href="/admin/relations">relations</a>
      <a class="nav" href="/admin/cron">cron</a>
      <a class="nav" href="/admin/sessions">sessions</a>
      <a class="nav active" href="/admin/voice" aria-current="page">voice</a>
      <a class="nav logout" href="/admin/logout">logout</a>
    </div>
  </div>

  <main class="work">
    <section class="panel control">
      <div class="field">
        <label for="agent">agent</label>
        <select id="agent"></select>
      </div>

      <div class="settings-grid">
        <div class="field">
          <label for="model">model</label>
          <select id="model"></select>
        </div>
        <div class="field">
          <label for="effort">effort</label>
          <select id="effort">
            <option value="">default</option>
            <option value="low">low</option>
            <option value="medium">medium</option>
            <option value="high">high</option>
          </select>
        </div>
        <div class="field">
          <label for="speaker">speaker</label>
          <select id="speaker">
            <option value="">unknown</option>
            <option value="user">User</option>
            <option value="speaker_b">Speaker B</option>
            <option value="speaker_c">Speaker C</option>
            <option value="speaker_d">Speaker D</option>
            <option value="multiple">Multiple</option>
            <option value="custom">custom</option>
          </select>
        </div>
      </div>

      <div id="speakerCustomWrap" class="field speaker-custom" hidden>
        <label for="speakerCustom">speaker name</label>
        <input id="speakerCustom" autocomplete="off" spellcheck="false" placeholder="Name">
      </div>

      <label class="switchline">
        <span>voice activation</span>
        <input id="voiceActivation" type="checkbox" checked>
      </label>

      <div>
        <div class="section-label">input level</div>
        <div class="meter"><div id="meterFill"></div></div>
      </div>

      <div class="buttons">
        <button id="startBtn" class="btn btn-main" type="button">activate</button>
        <button id="stopBtn" class="btn btn-stop" type="button">stop</button>
        <button id="recordOnceBtn" class="btn btn-record" type="button" hidden>record once</button>
      </div>
      <input id="captureInput" type="file" accept="audio/*" capture="microphone" hidden>

      <div class="field">
        <label for="manualText">text fallback</label>
        <textarea id="manualText" placeholder="Nachricht an Agent..."></textarea>
      </div>
      <button id="sendTextBtn" class="btn" type="button">send text</button>

      <div id="status" class="status">loading</div>
    </section>

    <section class="panel stage">
      <div class="signal">
        <div class="stat">
          <div class="stat-label">state</div>
          <div id="stateValue" class="stat-value">idle</div>
        </div>
        <div class="stat">
          <div class="stat-label">rate</div>
          <div id="rateValue" class="stat-value">-</div>
        </div>
        <div class="stat">
          <div class="stat-label">pause</div>
          <div id="pauseValue" class="stat-value">-</div>
        </div>
        <div class="stat">
          <div class="stat-label">tts</div>
          <div id="ttsValue" class="stat-value">-</div>
        </div>
      </div>
      <div id="conversation" class="conversation">
        <div class="line system">
          <div class="role">system</div>
          <div id="liveTranscript" class="transcript-live">standby</div>
        </div>
      </div>
    </section>
  </main>
</div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const SPEAKER_STORAGE_KEY = 'crabgent.voice.speaker';
  const SPEAKER_CUSTOM_STORAGE_KEY = 'crabgent.voice.speaker.custom';
  const VOICE_RMS = 0.025;
  const BARGE_IN_RMS = 0.035;
  const BARGE_IN_HOLD_MS = 220;
  const BARGE_IN_GRACE_MS = 900;
  const state = {
    agents: [],
    ws: null,
    audioCtx: null,
    mediaStream: null,
    analyser: null,
    meterTimer: null,
    recorder: null,
    chunks: [],
    recording: false,
    flushing: false,
    active: false,
    running: false,
    playing: false,
    listening: false,
    captureFallback: false,
    speechStart: 0,
    lastHot: 0,
    pauses: 0,
    pauseMs: 0,
    energyTotal: 0,
    energySamples: 0,
    currentAudio: null,
    currentAudioUrl: null,
    currentUtterance: null,
    awaitingTts: false,
    bargeStart: 0,
    bargeReadyAt: 0
  };

  function setCallActive(active) {
    state.active = active;
    $('startBtn').classList.toggle('active', active);
    $('startBtn').textContent = active ? 'deactivate' : 'activate';
  }

  function setStatus(text, tone) {
    $('status').innerHTML = tone ? `<span class="${tone}">${escapeHtml(text)}</span>` : escapeHtml(text);
  }

  function setState(text) {
    $('stateValue').textContent = text;
  }

  function escapeHtml(value) {
    return String(value)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;');
  }

  function addLine(role, text, klass) {
    const node = document.createElement('div');
    node.className = `line ${klass || role}`;
    const time = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
    node.innerHTML = `<div class="role">${escapeHtml(role)}<span class="time">${time}</span></div><div>${escapeHtml(text)}</div>`;
    $('conversation').appendChild(node);
    $('conversation').scrollTop = $('conversation').scrollHeight;
  }

  async function loadAgents() {
    const res = await fetch('/admin/api/voice/agents', { credentials: 'same-origin' });
    if (!res.ok) throw new Error(`agents ${res.status}`);
    const data = await res.json();
    state.agents = data.agents || [];
    $('agent').replaceChildren(...state.agents.map((agent) => {
      const option = document.createElement('option');
      option.value = agent.name;
      const flags = [
        agent.stt ? '' : 'no stt',
        agent.tts ? '' : 'no tts'
      ].filter(Boolean);
      option.textContent = agent.name + (flags.length ? ` (${flags.join(', ')})` : '');
      return option;
    }));
    if (state.agents.length > 0) {
      $('agent').value = state.agents[0].name;
    }
    updateModelChoices();
    updateTtsLabel();
  }

  function selectedAgent() {
    return $('agent').value || state.agents[0]?.name || '';
  }

  function selectedAgentInfo() {
    return state.agents.find((agent) => agent.name === selectedAgent());
  }

  function modelStorageKey(agent) {
    return `crabgent.voice.model.${agent}`;
  }

  function effortStorageKey(agent) {
    return `crabgent.voice.effort.${agent}`;
  }

  function selectedSpeaker() {
    const value = $('speaker').value;
    if (value === 'custom') return $('speakerCustom').value.trim();
    return value;
  }

  function updateSpeakerCustom() {
    const custom = $('speaker').value === 'custom';
    $('speakerCustomWrap').hidden = !custom;
    if (custom) $('speakerCustom').focus();
  }

  function updateModelChoices() {
    const agent = selectedAgentInfo();
    const modelSelect = $('model');
    modelSelect.replaceChildren();
    if (!agent) {
      updateEffortState();
      return;
    }
    const defaultOption = document.createElement('option');
    defaultOption.value = '';
    defaultOption.textContent = `default: ${agent.model || '-'}`;
    modelSelect.appendChild(defaultOption);
    for (const model of agent.models || []) {
      const option = document.createElement('option');
      option.value = model.id;
      const provider = model.provider ? `, ${model.provider}` : '';
      option.textContent = `${model.label || model.id}${provider}`;
      modelSelect.appendChild(option);
    }
    const storedModel = localStorage.getItem(modelStorageKey(agent.name)) || '';
    modelSelect.value = [...modelSelect.options].some((option) => option.value === storedModel)
      ? storedModel
      : '';
    const storedEffort = localStorage.getItem(effortStorageKey(agent.name)) || '';
    $('effort').value = ['low', 'medium', 'high'].includes(storedEffort) ? storedEffort : '';
    updateEffortState();
  }

  function selectedModelChoice() {
    const agent = selectedAgentInfo();
    if (!agent) return null;
    const id = $('model').value || agent.model;
    return (agent.models || []).find((model) => model.id === id) || null;
  }

  function selectedTurnOptions() {
    return {
      model: $('model').value || null,
      effort: $('effort').disabled ? null : ($('effort').value || null)
    };
  }

  function updateEffortState() {
    const choice = selectedModelChoice();
    const disabled = choice ? choice.supports_effort === false : false;
    $('effort').disabled = disabled;
    if (disabled) $('effort').value = '';
  }

  function updateTtsLabel() {
    const agent = selectedAgentInfo();
    $('ttsValue').textContent = agent ? (agent.tts ? 'server' : 'browser') : '-';
    if (agent && !agent.stt) setStatus(`${agent.name}: no server stt, text fallback only`, 'err');
  }

  function isLoopbackHost(hostname) {
    return hostname === 'localhost'
      || hostname === '127.0.0.1'
      || hostname === '[::1]'
      || hostname === '::1';
  }

  function getUserMediaCompat() {
    if (navigator.mediaDevices && typeof navigator.mediaDevices.getUserMedia === 'function') {
      return (constraints) => navigator.mediaDevices.getUserMedia(constraints);
    }
    const legacy = navigator.getUserMedia
      || navigator.webkitGetUserMedia
      || navigator.mozGetUserMedia
      || navigator.msGetUserMedia;
    if (!legacy) return null;
    return (constraints) => new Promise((resolve, reject) => {
      legacy.call(navigator, constraints, resolve, reject);
    });
  }

  function micUnavailableMessage() {
    if (!window.isSecureContext && !isLoopbackHost(location.hostname)) {
      return 'microphone needs https, native recorder fallback active';
    }
    return 'microphone api missing, native recorder fallback active';
  }

  function setCaptureFallback(active, message) {
    state.captureFallback = active;
    $('recordOnceBtn').hidden = !active;
    if (message) setStatus(message, active ? 'err' : undefined);
  }

  function connect() {
    const agent = selectedAgent();
    if (!agent) return;
    closeSocket();
    const scheme = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const socket = new WebSocket(`${scheme}//${location.host}/admin/voice/ws/${encodeURIComponent(agent)}`);
    state.ws = socket;
    socket.onopen = () => {
      if (state.ws !== socket) return;
      setStatus(`connected to ${agent}`, 'ok');
      setState('idle');
      maybeListen();
    };
    socket.onclose = () => {
      if (state.ws !== socket) return;
      state.ws = null;
      setCallActive(false);
      setStatus('disconnected', 'err');
      setState('offline');
      discardRecording();
      releaseMic();
    };
    socket.onerror = () => {
      if (state.ws === socket) setStatus('socket error', 'err');
    };
    socket.onmessage = (event) => {
      if (state.ws === socket) handleFrame(JSON.parse(event.data));
    };
    return socket;
  }

  function closeSocket() {
    if (state.ws) {
      state.ws.close();
      state.ws = null;
    }
  }

  function sendFrame(frame) {
    if (!state.ws || state.ws.readyState !== WebSocket.OPEN) {
      setStatus('not connected', 'err');
      return false;
    }
    state.ws.send(JSON.stringify(frame));
    return true;
  }

  function handleFrame(frame) {
    switch (frame.kind) {
      case 'status':
        if (frame.data && frame.data.tts === false) $('ttsValue').textContent = 'browser';
        break;
      case 'transcribing':
        setState('stt');
        break;
      case 'transcript':
        addLine('user', frame.data?.text || '', 'user');
        $('liveTranscript').textContent = frame.data?.text || 'transcribed';
        if (frame.data?.voice?.speech_rate_wpm) $('rateValue').textContent = frame.data.voice.speech_rate_wpm;
        if (frame.data?.voice?.pause_ms) $('pauseValue').textContent = `${frame.data.voice.pause_ms}ms`;
        setState('thinking');
        break;
      case 'token':
        setState('answering');
        state.running = true;
        state.awaitingTts = false;
        discardRecording();
        break;
      case 'reasoning':
      case 'tool_call_started':
      case 'tool_call_completed':
      case 'notice':
        break;
      case 'final':
        state.running = false;
        state.awaitingTts = true;
        state.bargeReadyAt = performance.now() + 150;
        setState('tts');
        addLine('agent', frame.data || '', 'agent');
        break;
      case 'audio':
        state.awaitingTts = false;
        playServerAudio(frame.data);
        break;
      case 'tts_unavailable':
      case 'tts_error':
        state.awaitingTts = false;
        state.playing = false;
        setState('speaking');
        speakBrowser(frame.data?.text || lastAgentText());
        break;
      case 'stt_unavailable':
      case 'stt_error':
        state.running = false;
        setStatus(frame.data?.message || String(frame.data), 'err');
        returnToIdle();
        break;
      case 'empty_audio':
        state.running = false;
        returnToIdle();
        break;
      case 'tts_cancelled':
      case 'cancelled':
        state.running = false;
        state.playing = false;
        state.awaitingTts = false;
        returnToIdle();
        break;
      case 'turn_error':
        state.running = false;
        state.awaitingTts = false;
        setStatus(frame.data?.message || String(frame.data), 'err');
        returnToIdle();
        break;
      default:
        break;
    }
  }

  function lastAgentText() {
    const nodes = [...document.querySelectorAll('.line.agent')];
    return nodes.at(-1)?.textContent?.replace(/^agent/i, '').trim() || '';
  }

  function returnToIdle() {
    if (state.recording || state.flushing) return;
    setState('idle');
    maybeListen();
  }

  function submitPrompt(text, metrics) {
    const prompt = text.trim();
    if (!prompt) return;
    addLine('user', prompt, 'user');
    setState('thinking');
    state.running = true;
    state.awaitingTts = false;
    state.bargeReadyAt = performance.now() + BARGE_IN_GRACE_MS;
    $('liveTranscript').textContent = 'standby';
    discardRecording();
    sendFrame({ prompt, metrics, ...selectedTurnOptions() });
  }

  async function startCall() {
    if (state.active) {
      deactivateCall();
      return;
    }
    const getUserMedia = getUserMediaCompat();
    if (!getUserMedia) {
      setCallActive(true);
      setCaptureFallback(true, micUnavailableMessage());
      setState('recorder');
      if (!state.ws || state.ws.readyState !== WebSocket.OPEN) connect();
      openCaptureRecorder();
      return;
    }
    try {
      await ensureMic(getUserMedia);
    } catch (err) {
      setStatus(`microphone: ${err.message}`, 'err');
      setCaptureFallback(true, 'microphone denied, native recorder fallback active');
      setCallActive(true);
      setState('recorder');
      if (!state.ws || state.ws.readyState !== WebSocket.OPEN) connect();
      return;
    }
    if (!state.mediaStream) return;
    setCaptureFallback(false);
    setCallActive(true);
    if (!state.ws || state.ws.readyState !== WebSocket.OPEN) connect();
    else maybeListen();
  }

  function stopCall() {
    deactivateCall();
  }

  function deactivateCall() {
    const shouldStop = state.running || state.playing || state.awaitingTts;
    setCallActive(false);
    stopPlayback();
    discardRecording();
    releaseMic();
    if (shouldStop) sendFrame({ stop: true });
    state.running = false;
    state.playing = false;
    state.awaitingTts = false;
    setState('idle');
    $('liveTranscript').textContent = 'standby';
  }

  async function ensureMic(getUserMedia) {
    if (state.mediaStream) return;
    try {
      state.mediaStream = await getUserMedia({
        audio: {
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true
        }
      });
    } catch (err) {
      if (!['OverconstrainedError', 'ConstraintNotSatisfiedError', 'TypeError'].includes(err.name)) throw err;
      state.mediaStream = await getUserMedia({ audio: true });
    }
    const AudioCtor = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtor) throw new Error('audio context missing');
    state.audioCtx = new AudioCtor();
    await state.audioCtx.resume();
    const source = state.audioCtx.createMediaStreamSource(state.mediaStream);
    state.analyser = state.audioCtx.createAnalyser();
    state.analyser.fftSize = 1024;
    source.connect(state.analyser);
    startMeter();
  }

  function stopMeter() {
    clearInterval(state.meterTimer);
    state.meterTimer = null;
    $('meterFill').style.width = '0%';
  }

  function releaseMic() {
    stopMeter();
    if (state.mediaStream) {
      for (const track of state.mediaStream.getTracks()) track.stop();
    }
    state.mediaStream = null;
    state.analyser = null;
    if (state.audioCtx) {
      state.audioCtx.close().catch(() => {});
    }
    state.audioCtx = null;
  }

  function startMeter() {
    const data = new Uint8Array(state.analyser.frequencyBinCount);
    clearInterval(state.meterTimer);
    state.meterTimer = setInterval(() => {
      state.analyser.getByteTimeDomainData(data);
      let sum = 0;
      for (const value of data) {
        const centered = (value - 128) / 128;
        sum += centered * centered;
      }
      const rms = Math.sqrt(sum / data.length);
      $('meterFill').style.width = `${Math.min(100, Math.round(rms * 520))}%`;
      const now = performance.now();
      if (maybeBargeIn(rms, now)) return;
      if (rms > VOICE_RMS) {
        if (shouldRecord()) beginRecording();
        if (!state.speechStart) state.speechStart = now;
        if (state.lastHot && now - state.lastHot > 450) {
          state.pauses += 1;
          state.pauseMs += Math.round(now - state.lastHot);
        }
        state.lastHot = now;
        state.energyTotal += rms;
        state.energySamples += 1;
      }
      if (state.recording && state.lastHot && now - state.lastHot > 900) flushRecording();
      if (state.recording && state.speechStart && now - state.speechStart > 24000) flushRecording();
    }, 80);
  }

  function maybeListen() {
    if (!state.active || !$('voiceActivation').checked || state.running || state.playing || state.awaitingTts || state.recording || state.flushing) return;
    if (!window.MediaRecorder) {
      setCaptureFallback(true, 'media recorder missing, native recorder fallback active');
      return;
    }
    if (!state.mediaStream) return;
    resetMetrics();
    state.listening = true;
    setState('listening');
    $('liveTranscript').textContent = 'listening';
  }

  function shouldRecord() {
    return state.active
      && state.listening
      && $('voiceActivation').checked
      && !state.running
      && !state.playing
      && !state.awaitingTts
      && !state.recording
      && !state.flushing
      && !!state.mediaStream;
  }

  function maybeBargeIn(rms, now) {
    if (!shouldBargeIn(rms, now)) {
      if (rms <= BARGE_IN_RMS) state.bargeStart = 0;
      return false;
    }
    if (!state.bargeStart) state.bargeStart = now;
    if (now - state.bargeStart < BARGE_IN_HOLD_MS) return false;
    bargeIn(now);
    return true;
  }

  function shouldBargeIn(rms, now) {
    return state.active
      && $('voiceActivation').checked
      && !!state.mediaStream
      && !state.recording
      && !state.flushing
      && (state.running || state.awaitingTts || state.playing)
      && now >= state.bargeReadyAt
      && rms > BARGE_IN_RMS;
  }

  function bargeIn(now) {
    const shouldStop = state.running || state.awaitingTts || state.playing;
    stopPlayback();
    if (shouldStop) sendFrame({ stop: true });
    state.running = false;
    state.awaitingTts = false;
    state.bargeStart = 0;
    state.listening = true;
    resetMetrics();
    state.speechStart = Math.max(1, now - BARGE_IN_HOLD_MS);
    state.lastHot = now;
    $('liveTranscript').textContent = 'barge-in';
    beginRecording();
  }

  function beginRecording() {
    if (!window.MediaRecorder) return;
    const mime = preferredAudioMime();
    try {
      state.chunks = [];
      state.recorder = mime
        ? new MediaRecorder(state.mediaStream, { mimeType: mime })
        : new MediaRecorder(state.mediaStream);
    } catch (err) {
      setStatus(`recorder: ${err.message}`, 'err');
      return;
    }
    state.recording = true;
    state.flushing = false;
    state.recorder.ondataavailable = (event) => {
      if (event.data && event.data.size > 0) state.chunks.push(event.data);
    };
    state.recorder.onstop = () => finishRecording();
    state.recorder.start(200);
    setState('recording');
  }

  function preferredAudioMime() {
    const choices = [
      'audio/webm;codecs=opus',
      'audio/webm',
      'audio/mp4',
      'audio/ogg;codecs=opus',
      'audio/ogg'
    ];
    return choices.find((mime) => MediaRecorder.isTypeSupported(mime)) || '';
  }

  function flushRecording() {
    if (!state.recorder || state.recorder.state === 'inactive') return;
    state.flushing = true;
    state.listening = false;
    setState('transcribing');
    state.recorder.stop();
  }

  function discardRecording() {
    state.listening = false;
    state.flushing = false;
    state.chunks = [];
    if (state.recorder && state.recorder.state !== 'inactive') {
      state.recorder.onstop = null;
      state.recorder.stop();
    }
    state.recorder = null;
    state.recording = false;
  }

  async function finishRecording() {
    const chunks = state.chunks;
    const mime = state.recorder?.mimeType || preferredAudioMime() || 'audio/webm';
    state.recorder = null;
    state.recording = false;
    state.chunks = [];
    const blob = new Blob(chunks, { type: mime });
    if (blob.size < 1200 || !state.flushing) {
      state.flushing = false;
      maybeListen();
      return;
    }
    state.running = true;
    state.awaitingTts = false;
    state.bargeReadyAt = performance.now() + BARGE_IN_GRACE_MS;
    state.flushing = false;
    const metrics = captureMetrics();
    const data = await blobToBase64(blob);
    sendFrame({
      audio: {
        mime: (blob.type || mime || 'audio/webm').split(';')[0],
        data
      },
      metrics,
      ...selectedTurnOptions()
    });
  }

  function openCaptureRecorder() {
    if (!state.active || state.running || state.playing) return;
    const input = $('captureInput');
    input.value = '';
    input.click();
  }

  async function waitForSocketOpen(timeoutMs = 5000) {
    if (state.ws && state.ws.readyState === WebSocket.OPEN) return true;
    const socket = state.ws || connect();
    if (!socket) return false;
    return new Promise((resolve) => {
      let settled = false;
      const done = (ok) => {
        if (settled) return;
        settled = true;
        clearTimeout(timer);
        socket.removeEventListener('open', onOpen);
        socket.removeEventListener('close', onClose);
        socket.removeEventListener('error', onClose);
        resolve(ok);
      };
      const onOpen = () => done(true);
      const onClose = () => done(false);
      const timer = setTimeout(() => done(false), timeoutMs);
      socket.addEventListener('open', onOpen);
      socket.addEventListener('close', onClose);
      socket.addEventListener('error', onClose);
    });
  }

  async function handleCaptureFile(event) {
    const file = event.target.files?.[0];
    if (!file) return;
    setCallActive(true);
    setCaptureFallback(true);
    setState('transcribing');
    state.running = true;
    state.awaitingTts = false;
    state.bargeReadyAt = performance.now() + BARGE_IN_GRACE_MS;
    const ready = await waitForSocketOpen();
    if (!ready) {
      state.running = false;
      setState('offline');
      setStatus('socket not connected', 'err');
      return;
    }
    const data = await blobToBase64(file);
    const ok = sendFrame({
      audio: {
        mime: (file.type || 'audio/mp4').split(';')[0],
        data
      },
      metrics: {
        source: 'mobile_capture',
        claimed_speaker: selectedSpeaker() || null
      },
      ...selectedTurnOptions()
    });
    if (!ok) {
      state.running = false;
      setState('offline');
    }
  }

  function blobToBase64(blob) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onerror = () => reject(reader.error);
      reader.onload = () => resolve(String(reader.result).split(',')[1] || '');
      reader.readAsDataURL(blob);
    });
  }

  function resetMetrics() {
    state.speechStart = 0;
    state.lastHot = 0;
    state.pauses = 0;
    state.pauseMs = 0;
    state.energyTotal = 0;
    state.energySamples = 0;
  }

  function captureMetrics() {
    const speechMs = state.speechStart ? Math.max(1, Math.round(performance.now() - state.speechStart)) : 0;
    const avg = state.energySamples ? state.energyTotal / state.energySamples : 0;
    const energy = avg > 0.08 ? 'high' : avg > 0.04 ? 'medium' : 'low';
    const speaker = selectedSpeaker();
    $('pauseValue').textContent = state.pauseMs ? `${state.pauseMs}ms` : '-';
    return {
      source: 'server_stt',
      speech_ms: speechMs || null,
      pause_ms: state.pauseMs || null,
      pause_count: state.pauses || null,
      energy,
      claimed_speaker: speaker || null
    };
  }

  function playServerAudio(data) {
    stopPlayback();
    const bytes = Uint8Array.from(atob(data.data), (char) => char.charCodeAt(0));
    const blob = new Blob([bytes], { type: data.mime || 'audio/mpeg' });
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.playsInline = true;
    state.currentAudio = audio;
    state.currentAudioUrl = url;
    state.playing = true;
    state.bargeReadyAt = performance.now() + 350;
    setState('speaking');
    audio.onended = () => {
      if (state.currentAudio !== audio) return;
      URL.revokeObjectURL(url);
      state.playing = false;
      state.currentAudio = null;
      state.currentAudioUrl = null;
      setState('idle');
      maybeListen();
    };
    audio.onerror = () => {
      if (state.currentAudio !== audio) return;
      URL.revokeObjectURL(url);
      state.playing = false;
      state.currentAudio = null;
      state.currentAudioUrl = null;
      speakBrowser(data.text || '');
    };
    audio.play().catch(() => {
      if (state.currentAudio !== audio) return;
      URL.revokeObjectURL(url);
      state.currentAudio = null;
      state.currentAudioUrl = null;
      speakBrowser(data.text || '');
    });
  }

  function stopPlayback() {
    stopCurrentAudio();
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    state.currentUtterance = null;
    state.playing = false;
  }

  function stopCurrentAudio() {
    if (!state.currentAudio) return;
    const audio = state.currentAudio;
    const url = state.currentAudioUrl;
    audio.onended = null;
    audio.onerror = null;
    audio.pause();
    try {
      audio.currentTime = 0;
    } catch (_err) {
      // Some mobile browsers reject seeks on streams that never started.
    }
    state.currentAudio = null;
    state.currentAudioUrl = null;
    if (url) URL.revokeObjectURL(url);
    state.playing = false;
  }

  function speakBrowser(text) {
    if (!text || !window.speechSynthesis) {
      setState('idle');
      maybeListen();
      return;
    }
    stopPlayback();
    state.playing = true;
    state.bargeReadyAt = performance.now() + 350;
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'de-DE';
    state.currentUtterance = utterance;
    utterance.onend = () => {
      if (state.currentUtterance !== utterance) return;
      state.currentUtterance = null;
      state.playing = false;
      setState('idle');
      maybeListen();
    };
    utterance.onerror = utterance.onend;
    window.speechSynthesis.speak(utterance);
  }

  $('startBtn').addEventListener('click', startCall);
  $('stopBtn').addEventListener('click', stopCall);
  $('recordOnceBtn').addEventListener('click', openCaptureRecorder);
  $('captureInput').addEventListener('change', handleCaptureFile);
  $('sendTextBtn').addEventListener('click', () => {
    const text = $('manualText').value;
    $('manualText').value = '';
    submitPrompt(text, null);
  });
  $('agent').addEventListener('change', () => {
    updateModelChoices();
    updateTtsLabel();
    if (state.active) connect();
  });
  $('model').addEventListener('change', () => {
    const agent = selectedAgent();
    if (agent) localStorage.setItem(modelStorageKey(agent), $('model').value);
    updateEffortState();
  });
  $('effort').addEventListener('change', () => {
    const agent = selectedAgent();
    if (agent) localStorage.setItem(effortStorageKey(agent), $('effort').value);
  });
  $('speaker').addEventListener('change', () => {
    localStorage.setItem(SPEAKER_STORAGE_KEY, $('speaker').value);
    updateSpeakerCustom();
  });
  $('speakerCustom').addEventListener('input', () => {
    localStorage.setItem(SPEAKER_CUSTOM_STORAGE_KEY, $('speakerCustom').value);
  });
  $('voiceActivation').addEventListener('change', () => {
    if ($('voiceActivation').checked) maybeListen();
    else discardRecording();
  });
  $('speaker').value = localStorage.getItem(SPEAKER_STORAGE_KEY) || '';
  $('speakerCustom').value = localStorage.getItem(SPEAKER_CUSTOM_STORAGE_KEY) || '';
  updateSpeakerCustom();

  loadAgents()
    .then(() => {
      const mic = getUserMediaCompat();
      if (!mic) {
        setCaptureFallback(true, micUnavailableMessage());
      } else if (!window.MediaRecorder) {
        setCaptureFallback(true, 'media recorder missing, native recorder fallback active');
      } else {
        setStatus('ready, server stt');
      }
      setState('idle');
    })
    .catch((err) => {
      setStatus(err.message, 'err');
      setState('error');
    });
})();
</script>
<div id="cgPalette" class="overlay" hidden>
  <div class="overlay-box palette">
    <input id="cgPaletteInput" type="text" placeholder="command or page..." autocomplete="off" spellcheck="false">
    <div id="cgPaletteList" class="palette-list"></div>
  </div>
</div>
<div id="cgCheat" class="overlay" hidden>
  <div class="overlay-box cheat">
    <h3>keyboard</h3>
    <div class="cheat-grid">
      <span><kbd>cmd</kbd>+<kbd>k</kbd></span><span>command palette</span>
      <span><kbd>/</kbd></span><span>focus text input</span>
      <span><kbd>g</kbd> <kbd>m</kbd>/<kbd>r</kbd>/<kbd>c</kbd>/<kbd>s</kbd>/<kbd>v</kbd></span><span>go to memory / relations / cron / sessions / voice</span>
      <span><kbd>?</kbd></span><span>this help</span>
      <span><kbd>esc</kbd></span><span>close overlays</span>
    </div>
  </div>
</div>
<script>
(() => {
  const KEYMAP = { m: '/admin', r: '/admin/relations', c: '/admin/cron', s: '/admin/sessions', v: '/admin/voice' };
  const NAV = [
    ['memory', '/admin'], ['relations', '/admin/relations'], ['cron', '/admin/cron'],
    ['sessions', '/admin/sessions'], ['voice', '/admin/voice'],
  ];
  const pal = document.getElementById('cgPalette');
  const input = document.getElementById('cgPaletteInput');
  const list = document.getElementById('cgPaletteList');
  const cheat = document.getElementById('cgCheat');
  let items = [];
  let sel = 0;
  let goPending = 0;

  function actions() {
    return NAV.map(([label, href]) => ({ label: 'go to ' + label, run: () => { location.href = href; } }))
      .concat([{ label: 'focus search', run: focusSearch }])
      .concat(window.crabgentActions || []);
  }
  function focusSearch() {
    const el = document.querySelector('.filterbar input[type="text"], #manualText');
    if (el) { el.focus(); if (el.select) el.select(); }
  }
  function render() {
    const q = input.value.toLowerCase();
    items = actions().filter(a => a.label.toLowerCase().includes(q));
    if (sel >= items.length) sel = Math.max(0, items.length - 1);
    list.textContent = '';
    if (!items.length) {
      const div = document.createElement('div');
      div.className = 'palette-empty';
      div.textContent = 'no match';
      list.appendChild(div);
      return;
    }
    items.forEach((a, i) => {
      const div = document.createElement('div');
      div.className = 'palette-item' + (i === sel ? ' sel' : '');
      div.textContent = a.label;
      div.addEventListener('click', () => { closeAll(); a.run(); });
      list.appendChild(div);
    });
  }
  function openPal() { pal.hidden = false; input.value = ''; sel = 0; render(); input.focus(); }
  function closeAll() { pal.hidden = true; cheat.hidden = true; }
  input.addEventListener('input', () => { sel = 0; render(); });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowDown') { e.preventDefault(); sel = Math.min(items.length - 1, sel + 1); render(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); sel = Math.max(0, sel - 1); render(); }
    else if (e.key === 'Enter') { const a = items[sel]; if (a) { closeAll(); a.run(); } }
  });
  pal.addEventListener('click', (e) => { if (e.target === pal) closeAll(); });
  cheat.addEventListener('click', (e) => { if (e.target === cheat) closeAll(); });
  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
      e.preventDefault();
      if (pal.hidden) openPal(); else closeAll();
      return;
    }
    if (e.key === 'Escape') { closeAll(); return; }
    const t = e.target;
    if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.tagName === 'SELECT' || t.isContentEditable)) return;
    if (e.key === '/') { e.preventDefault(); focusSearch(); return; }
    if (e.key === '?') { cheat.hidden = !cheat.hidden; return; }
    if (e.key === 'g') { goPending = Date.now(); return; }
    if (goPending && Date.now() - goPending < 900 && KEYMAP[e.key]) { location.href = KEYMAP[e.key]; }
    goPending = 0;
  });
})();
</script>
</body>
</html>
