[package]
name = "crabgent-store"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Trait surfaces for crabgent persistence (sessions, tasks, cron jobs, tool cache) plus an in-memory backend for tests and solo runs."

[lints]
workspace = true

[features]
default = ["memory"]
memory = []

[dependencies]
crabgent-core.workspace = true
crabgent-log.workspace = true
async-trait.workspace = true
chrono.workspace = true
serde = { workspace = true }
serde_json.workspace = true
thiserror.workspace = true
uuid.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt"] }
