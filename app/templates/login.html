<!doctype html>
<html lang="de" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="referrer" content="no-referrer">
<title>crabgent :: auth</title>
<link rel="preconnect" href="https://fonts.bunny.net">
<link href="https://fonts.bunny.net/css?family=ibm-plex-mono:400,500,600,700|martian-mono:700,800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0b0e;
  --bg-deep: #060708;
  --panel: #111319;
  --panel-2: #161922;
  --panel-3: #1b1f2a;
  --border: #242a35;
  --border-hot: #364050;
  --text: #d8d4c6;
  --bright: #f4f1e7;
  --muted: #7b8292;
  --dim: #4b5263;
  --claw: #ff5b2c;
  --claw-soft: #ff7b50;
  --danger: #ff4545;
  --success: #7fd17a;
  --mono: 'IBM Plex Mono', 'JetBrains Mono', 'SF Mono', 'Menlo', monospace;
  --display: 'Martian Mono', 'IBM Plex Mono', monospace;
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  min-height: 100%;
  background:
    radial-gradient(1100px 540px at 14% -10%, rgba(255, 91, 44, 0.08), transparent 60%),
    radial-gradient(900px 480px at 90% 112%, rgba(79, 196, 215, 0.05), transparent 55%),
    var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(216, 212, 198, 0.030) 1px, transparent 1px),
    linear-gradient(90deg, rgba(216, 212, 198, 0.022) 1px, transparent 1px);
  background-size: 34px 34px;
  -webkit-mask-image: radial-gradient(ellipse 130% 100% at 50% 0%, black 25%, transparent 80%);
  mask-image: radial-gradient(ellipse 130% 100% at 50% 0%, black 25%, transparent 80%);
  z-index: 0;
}
body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: 0.16;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.55  0 0 0 0 0.55  0 0 0 0 0.55  0 0 0 0.6 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  z-index: 1000;
  mix-blend-mode: overlay;
}
::selection { background: var(--claw); color: var(--bg); }

@keyframes rise {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: none; }
}
@keyframes blink { 50% { opacity: 0; } }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; }
}

.wrap {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 24px;
}
.gate { width: min(440px, 100%); }

.crab {
  margin: 0 0 18px;
  color: var(--dim);
  font-size: 12px;
  line-height: 1.25;
  text-align: center;
  white-space: pre;
  user-select: none;
  animation: rise 0.5s ease-out both;
}
.crab b { color: var(--claw); font-weight: 400; }

.box {
  background: linear-gradient(180deg, var(--panel-2), var(--panel));
  border: 1px solid var(--border);
  padding: 30px 34px 26px;
  position: relative;
  box-shadow: 0 30px 80px -30px rgba(0, 0, 0, 0.85);
  animation: rise 0.5s 0.08s ease-out both;
}
.box::before, .box::after {
  content: "";
  position: absolute;
  width: 18px;
  height: 18px;
  pointer-events: none;
}
.box::before {
  top: -1px;
  left: -1px;
  border-top: 2px solid var(--claw);
  border-left: 2px solid var(--claw);
}
.box::after {
  bottom: -1px;
  right: -1px;
  border-bottom: 2px solid var(--border-hot);
  border-right: 2px solid var(--border-hot);
}

.brand {
  font-family: var(--display);
  font-weight: 800;
  font-size: 15px;
  letter-spacing: 0.04em;
  margin: 0 0 6px;
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--bright);
}
.brand::before {
  content: "\27a4\27a4";
  color: var(--claw);
  letter-spacing: -0.12em;
  text-shadow: 0 0 14px rgba(255, 91, 44, 0.6);
}
.crumb {
  color: var(--muted);
  font-family: var(--mono);
  font-weight: 400;
  font-size: 13px;
}
.crumb::before { content: "::"; color: var(--dim); margin-right: 8px; }
.cursor {
  display: inline-block;
  width: 8px;
  height: 15px;
  background: var(--claw);
  animation: blink 1.1s steps(2) infinite;
}
.lede {
  color: var(--muted);
  font-size: 12px;
  margin: 0 0 22px;
  letter-spacing: 0.02em;
}
.lede code { color: var(--text); font-family: var(--mono); }

label {
  display: block;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  margin: 0 0 6px;
}
input[type=password], input[type=text] {
  width: 100%;
  background: var(--bg-deep);
  color: var(--bright);
  border: 1px solid var(--border);
  padding: 11px 13px;
  font-family: var(--mono);
  font-size: 13px;
  outline: none;
  margin-bottom: 16px;
  caret-color: var(--claw);
  box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.4);
  transition: border-color 0.15s, box-shadow 0.15s;
}
input:focus {
  border-color: var(--claw);
  box-shadow:
    inset 0 2px 6px rgba(0, 0, 0, 0.4),
    0 0 0 1px rgba(255, 91, 44, 0.3),
    0 0 22px -8px rgba(255, 91, 44, 0.55);
}
button {
  position: relative;
  width: 100%;
  background: var(--claw);
  color: var(--bg-deep);
  border: 0;
  padding: 11px 0;
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  cursor: pointer;
  font-weight: 700;
  overflow: hidden;
  transition: filter 0.15s, box-shadow 0.15s;
}
button::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(115deg, transparent 30%, rgba(255, 255, 255, 0.35) 50%, transparent 70%);
  transform: translateX(-110%);
  transition: transform 0.45s ease;
}
button:hover { filter: brightness(1.08); box-shadow: 0 6px 26px -8px rgba(255, 91, 44, 0.7); }
button:hover::after { transform: translateX(110%); }
button:active { filter: brightness(0.94); }

.err {
  color: var(--danger);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin: 14px 0 0;
  border-left: 2px solid var(--danger);
  background: rgba(255, 69, 69, 0.07);
  padding: 8px 10px;
}
.foot {
  margin-top: 22px;
  color: var(--dim);
  font-size: 11px;
  border-top: 1px dashed var(--border);
  padding-top: 12px;
  letter-spacing: 0.04em;
  display: flex;
  align-items: center;
  gap: 8px;
}
.foot::before {
  content: "";
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--success);
  box-shadow: 0 0 8px rgba(127, 209, 122, 0.8);
  animation: blink 2.4s steps(2) infinite;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="gate">
    <pre class="crab" aria-hidden="true">   _~^~^~_
<b>\) /</b>  o o  <b>\ (/</b>
  '_   -   _'
  / '-----' \</pre>
    <form class="box" method="post" action="/admin/login" autocomplete="off">
      <h1 class="brand">crabgent<span class="crumb">auth</span><span class="cursor" aria-hidden="true"></span></h1>
      <p class="lede">static-key gate. provide the admin token from <code>[web].auth_token</code>.</p>
      <label for="token">admin token</label>
      <input type="password" id="token" name="token" required autofocus>
      <button type="submit">enter</button>
      <!-- ERROR_SLOT -->
      <div class="foot">session cookie scoped to /admin, expires in 24h</div>
    </form>
  </div>
</div>
</body>
</html>
