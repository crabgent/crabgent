<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; padding: 0; }
  #avatar { width: 1024px; height: 1024px; display: block; }
</style>
</head>
<body>
<svg id="avatar" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#16110d"/>
      <stop offset="55%" stop-color="#0c0c10"/>
      <stop offset="100%" stop-color="#07080a"/>
    </radialGradient>
    <radialGradient id="clawGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff5b2c" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#ff5b2c" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ff5b2c" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#d8d4c6" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="512" height="512" fill="url(#bgGlow)"/>
  <rect width="512" height="512" fill="url(#grid)"/>
  <circle cx="256" cy="240" r="230" fill="url(#clawGlow)"/>

  <!-- hud corner brackets -->
  <path d="M 28 64 L 28 28 L 64 28" fill="none" stroke="#ff5b2c" stroke-width="10" stroke-linecap="square"/>
  <path d="M 484 448 L 484 484 L 448 484" fill="none" stroke="#39404f" stroke-width="10" stroke-linecap="square"/>

  <!-- crab -->
  <g filter="url(#glow)">
    <!-- legs: three each side, angular -->
    <g stroke="#ff5b2c" stroke-width="16" fill="none" stroke-linecap="square">
      <path d="M 168 296 L 110 330 L 84 384"/>
      <path d="M 176 322 L 132 366 L 124 420"/>
      <path d="M 344 296 L 402 330 L 428 384"/>
      <path d="M 336 322 L 380 366 L 388 420"/>
    </g>

    <!-- claw arms -->
    <g stroke="#ff5b2c" stroke-width="18" fill="none" stroke-linecap="square">
      <path d="M 182 256 L 128 208 L 122 164"/>
      <path d="M 330 256 L 384 208 L 390 164"/>
    </g>

    <!-- left claw: angular pincer -->
    <g fill="#ff5b2c">
      <path d="M 158 78 L 92 96 L 64 148 L 96 188 L 152 178 L 132 150 L 158 122 Z"/>
      <path d="M 158 78 L 196 104 L 188 146 L 158 122 Z" fill="#ff7b50"/>
    </g>
    <!-- right claw: angular pincer -->
    <g fill="#ff5b2c">
      <path d="M 354 78 L 420 96 L 448 148 L 416 188 L 360 178 L 380 150 L 354 122 Z"/>
      <path d="M 354 78 L 316 104 L 324 146 L 354 122 Z" fill="#ff7b50"/>
    </g>

    <!-- eye stalks -->
    <g stroke="#ff5b2c" stroke-width="12" fill="none" stroke-linecap="square">
      <path d="M 222 212 L 214 184"/>
      <path d="M 290 212 L 298 184"/>
    </g>
    <rect x="200" y="158" width="28" height="28" fill="#ff5b2c"/>
    <rect x="284" y="158" width="28" height="28" fill="#ff5b2c"/>

    <!-- body: angular octagon shell -->
    <path d="M 196 224 L 316 224 L 356 264 L 356 300 L 316 340 L 196 340 L 156 300 L 156 264 Z" fill="#13151b" stroke="#ff5b2c" stroke-width="14"/>

    <!-- shell detail: chevrons echoing the brand mark -->
    <g stroke="#ff5b2c" stroke-width="11" fill="none" stroke-linecap="square">
      <path d="M 228 256 L 252 282 L 228 308"/>
      <path d="M 264 256 L 288 282 L 264 308"/>
    </g>

    <!-- eyes on the dark shell -->
    <rect x="206" y="238" width="14" height="14" fill="#ff7b50" opacity="0"/>
  </g>
</svg>
</body>
</html>
