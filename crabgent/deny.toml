[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
yanked = "deny"
ignore = [
    # tokenizers 0.22.2 pulls paste via macro_rules_attribute.
    # RustSec marks paste unmaintained and lists no safe upgrade.
    "RUSTSEC-2024-0436",
]

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "Zlib",
    "CC0-1.0",
]
confidence-threshold = 0.8
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "warn"
# TODO: tighten to deny + allow-wildcard-paths once workspace publish=false strategy decided
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
