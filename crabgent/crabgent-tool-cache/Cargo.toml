[package]
name = "crabgent-tool-cache"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Hook + tool that compact large tool outputs into a ToolCacheStore-backed entry, with a cache_read tool that lets the LLM retrieve the full content on demand."

[lints]
workspace = true

[dependencies]
crabgent-core.workspace = true
crabgent-store.workspace = true
async-trait.workspace = true
chrono.workspace = true
serde = { workspace = true }
serde_json.workspace = true
thiserror.workspace = true
tokio.workspace = true
crabgent-log.workspace = true
uuid.workspace = true

[dev-dependencies]
crabgent-store = { workspace = true, features = ["memory"] }
crabgent-test-support = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt", "rt-multi-thread"] }
tokio-util.workspace = true
