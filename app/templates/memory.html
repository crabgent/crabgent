<!doctype html>
<html lang="de" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="referrer" content="no-referrer">
<title>crabgent :: memory</title>
<link rel="preconnect" href="https://fonts.bunny.net">
<link href="https://fonts.bunny.net/css?family=ibm-plex-mono:400,500,600,700|martian-mono:700,800&display=swap" rel="stylesheet">
<script defer src="https://unpkg.com/@alpinejs/collapse@3.14.1/dist/cdn.min.js" integrity="sha384-NArNwzWsUSF+kY2lgW4YriEkjLqi+J+za6HrENUn/3nZqkBnWbxV22kCJEK5Uu6n" crossorigin="anonymous"></script>
<script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js" integrity="sha384-l8f0VcPi/M1iHPv8egOnY/15TDwqgbOR1anMIJWvU6nLRgZVLTLSaNqi/TOoT5Fh" crossorigin="anonymous"></script>
<style>
:root {
  --bg: #0a0b0e;
  --bg-deep: #060708;
  --panel: #111319;
  --panel-2: #161922;
  --panel-3: #1b1f2a;
  --border: #242a35;
  --border-hot: #364050;
  --text: #d8d4c6;
  --bright: #f4f1e7;
  --muted: #7b8292;
  --dim: #4b5263;
  --claw: #ff5b2c;
  --claw-soft: #ff7b50;
  --danger: #ff4545;
  --success: #7fd17a;
  --listen: #4fc4d7;
  --semantic: #b88aff;
  --episodic: #4fc4d7;
  --recency: #f0b942;
  --user_profile: #6ee7b7;
  --notes: #fda4af;
  --skill: #93c5fd;
  --tools: #cbd5e1;
  --mono: 'IBM Plex Mono', 'JetBrains Mono', 'SF Mono', 'Menlo', monospace;
  --display: 'Martian Mono', 'IBM Plex Mono', monospace;
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  min-height: 100%;
  background:
    radial-gradient(1100px 540px at 14% -10%, rgba(255, 91, 44, 0.07), transparent 60%),
    radial-gradient(900px 480px at 90% 112%, rgba(79, 196, 215, 0.045), transparent 55%),
    var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.5;
  font-feature-settings: "calt" 1, "liga" 0;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(216, 212, 198, 0.030) 1px, transparent 1px),
    linear-gradient(90deg, rgba(216, 212, 198, 0.022) 1px, transparent 1px);
  background-size: 34px 34px;
  -webkit-mask-image: radial-gradient(ellipse 130% 100% at 50% 0%, black 25%, transparent 80%);
  mask-image: radial-gradient(ellipse 130% 100% at 50% 0%, black 25%, transparent 80%);
  z-index: 0;
}
body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: 0.14;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.55  0 0 0 0 0.55  0 0 0 0 0.55  0 0 0 0.6 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  z-index: 1000;
  mix-blend-mode: overlay;
}
::selection { background: var(--claw); color: var(--bg); }
::-webkit-scrollbar { width: 9px; height: 9px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border: 2px solid var(--bg); border-radius: 5px; }
::-webkit-scrollbar-thumb:hover { background: var(--claw); }
[x-cloak] { display: none !important; }

@keyframes rise {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: none; }
}
@keyframes pulse { from { opacity: 0.7; } to { opacity: 1; } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pop {
  from { opacity: 0; transform: translateY(14px) scale(0.985); }
  to { opacity: 1; transform: none; }
}
@keyframes toast-in {
  from { opacity: 0; transform: translateX(12px); }
  to { opacity: 1; transform: none; }
}
@keyframes shimmer { to { background-position: -200% 0; } }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; }
}

.app { position: relative; z-index: 1; min-height: 100vh; padding-bottom: 64px; }

.masthead {
  position: sticky;
  top: 0;
  z-index: 50;
  background: color-mix(in srgb, var(--bg) 84%, transparent);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: stretch;
  justify-content: space-between;
  gap: 18px;
  flex-wrap: wrap;
  animation: rise 0.3s ease-out both;
}
.mark {
  font-family: var(--display);
  font-weight: 800;
  letter-spacing: 0.03em;
  font-size: 14px;
  color: var(--bright);
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 13px 0;
}
.mark::before {
  content: "\27a4\27a4";
  color: var(--claw);
  letter-spacing: -0.12em;
  text-shadow: 0 0 14px rgba(255, 91, 44, 0.6);
}
.right { display: flex; gap: 2px; align-items: stretch; flex-wrap: wrap; }
.right .spinner { align-self: center; margin-right: 10px; }
.nav {
  position: relative;
  display: flex;
  align-items: center;
  color: var(--muted);
  text-decoration: none;
  padding: 0 13px;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  transition: color 0.15s, background 0.15s;
}
.nav:hover { color: var(--bright); background: rgba(216, 212, 198, 0.04); }
.nav.active { color: var(--claw); }
.nav.active::after {
  content: "";
  position: absolute;
  left: 10px;
  right: 10px;
  bottom: -1px;
  height: 2px;
  background: var(--claw);
  box-shadow: 0 0 10px rgba(255, 91, 44, 0.7);
}
.nav.logout { color: var(--dim); }
.nav.logout:hover { color: var(--danger); background: rgba(255, 69, 69, 0.06); }

.filterbar {
  border-bottom: 1px solid var(--border);
  background: color-mix(in srgb, var(--panel) 72%, transparent);
  padding: 14px 24px;
  display: grid;
  grid-template-columns: 2fr repeat(6, minmax(120px, 1fr)) auto;
  gap: 12px;
  animation: rise 0.35s 0.05s ease-out both;
}
.filterbar .field { display: flex; flex-direction: column; gap: 5px; min-width: 0; }
.filterbar label {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.14em;
  text-transform: uppercase;
}
.filterbar input, .filterbar select {
  width: 100%;
  background: var(--bg-deep);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 7px 10px;
  font-family: var(--mono);
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.filterbar input::placeholder { color: var(--dim); }
.filterbar input:focus, .filterbar select:focus {
  border-color: var(--claw);
  box-shadow: 0 0 0 1px rgba(255, 91, 44, 0.25);
}
.filterbar select { appearance: none; cursor: pointer; padding-right: 24px;
  background-image: linear-gradient(45deg, transparent 50%, var(--muted) 50%), linear-gradient(135deg, var(--muted) 50%, transparent 50%);
  background-position: calc(100% - 12px) 50%, calc(100% - 8px) 50%;
  background-size: 4px 4px;
  background-repeat: no-repeat;
}
.q-wrap { position: relative; }
.q-wrap .q-hint {
  position: absolute;
  right: 8px;
  bottom: 7px;
  color: var(--dim);
  font-size: 10px;
  pointer-events: none;
}
.filterbar .reset {
  align-self: end;
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
  padding: 7px 16px;
  font-family: var(--mono);
  font-weight: 500;
  font-size: 11px;
  letter-spacing: 0.1em;
  cursor: pointer;
  text-transform: uppercase;
  transition: color 0.15s, border-color 0.15s, box-shadow 0.15s;
}
.filterbar .reset:hover {
  color: var(--claw);
  border-color: var(--claw);
  box-shadow: 0 0 0 1px rgba(255, 91, 44, 0.2);
}

.content {
  padding: 14px 24px;
  display: flex;
  flex-direction: column;
  gap: 0;
  max-width: 1400px;
  margin: 0 auto;
  animation: rise 0.4s 0.1s ease-out both;
}
.listmeta {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  padding: 2px 2px 12px;
  font-size: 11px;
  color: var(--muted);
}
.listmeta .count b { color: var(--bright); font-weight: 600; }
.chip {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  border: 1px solid color-mix(in srgb, var(--claw) 45%, transparent);
  background: color-mix(in srgb, var(--claw) 8%, transparent);
  color: var(--claw);
  font-family: var(--mono);
  font-size: 11px;
  padding: 3px 9px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.chip:hover { background: var(--claw); color: var(--bg-deep); }
.chip .x { font-weight: 700; }

.skel {
  height: 46px;
  border: 1px solid var(--border);
  background: linear-gradient(100deg, var(--panel) 40%, var(--panel-3) 50%, var(--panel) 60%);
  background-size: 200% 100%;
  animation: shimmer 1.2s linear infinite;
  margin-bottom: 8px;
}

.mrow {
  position: relative;
  border: 1px solid var(--border);
  background: linear-gradient(180deg, var(--panel-2), var(--panel));
  margin-bottom: 8px;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.mrow::before {
  content: "";
  position: absolute;
  left: -1px;
  top: -1px;
  bottom: -1px;
  width: 3px;
  background: var(--border-hot);
  opacity: 0.5;
  transition: opacity 0.15s;
}
.mrow.semantic::before { background: var(--semantic); }
.mrow.episodic::before { background: var(--episodic); }
.mrow.recency::before { background: var(--recency); }
.mrow.user_profile::before { background: var(--user_profile); }
.mrow.notes::before { background: var(--notes); }
.mrow.skill::before { background: var(--skill); }
.mrow.tools::before { background: var(--tools); }
.mrow:hover { border-color: var(--border-hot); box-shadow: 0 10px 28px -16px rgba(0, 0, 0, 0.9); }
.mrow:hover::before, .mrow.open::before { opacity: 1; }
.mrow.open { border-color: var(--border-hot); }
.mrow.editing { border-color: var(--claw); box-shadow: 0 0 0 1px rgba(255, 91, 44, 0.25); }

.mrow-head {
  display: grid;
  grid-template-columns: 104px minmax(0, 1fr) auto;
  gap: 14px;
  padding: 9px 14px;
  cursor: pointer;
  align-items: center;
}
.mrow-excerpt {
  color: var(--text);
  font-size: 12px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  word-break: break-word;
  white-space: pre-line;
}
.mrow.open .mrow-excerpt { display: none; }
.mrow-mini {
  display: flex;
  gap: 14px;
  align-items: center;
  color: var(--dim);
  font-size: 11px;
  white-space: nowrap;
}
.mrow-mini .who { color: var(--muted); }
.mrow-mini .chev { transition: transform 0.15s; color: var(--dim); }
.mrow.open .mrow-mini .chev { transform: rotate(90deg); color: var(--claw); }

.mrow-detail {
  border-top: 1px solid var(--border);
  display: grid;
  grid-template-columns: 260px 1fr;
}
.meta {
  border-right: 1px solid var(--border);
  padding: 12px 14px;
  font-size: 12px;
  color: var(--muted);
  display: flex;
  flex-direction: column;
  gap: 5px;
  background: rgba(6, 7, 8, 0.35);
}
.meta .id {
  color: var(--text);
  word-break: break-all;
  font-size: 11px;
  border-bottom: 1px dashed var(--border);
  padding-bottom: 6px;
  margin-bottom: 4px;
}
.meta .id .short { color: var(--claw); font-weight: 700; }
.meta .id .tail { color: var(--dim); }
.meta .row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.meta .k {
  color: var(--dim);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.meta .v { color: var(--muted); text-align: right; word-break: break-all; max-width: 180px; }
.meta .scope-line {
  font-size: 11px;
  color: var(--muted);
  word-break: break-all;
  border-top: 1px dashed var(--border);
  padding-top: 6px;
  margin-top: 4px;
}
.meta .scope-line .k { display: block; margin-bottom: 2px; }
.meta .scope-line .v { color: var(--text); text-align: left; max-width: none; }

.body {
  padding: 14px 18px 12px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  min-width: 0;
}
.body .text {
  white-space: pre-wrap;
  word-break: break-word;
  color: var(--text);
  flex: 1;
  font-size: 13px;
}
.body textarea {
  min-height: 110px;
  background: var(--bg-deep);
  color: var(--bright);
  border: 1px solid var(--border-hot);
  padding: 10px 12px;
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.5;
  resize: vertical;
  outline: none;
  caret-color: var(--claw);
  box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.4);
  transition: border-color 0.15s, box-shadow 0.15s;
}
.body textarea:focus {
  border-color: var(--claw);
  box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 91, 44, 0.3);
}

.tag {
  display: inline-block;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border: 1px solid color-mix(in srgb, currentColor 50%, transparent);
  background: color-mix(in srgb, currentColor 9%, transparent);
  padding: 1px 8px;
  color: var(--muted);
  font-weight: 500;
  white-space: nowrap;
}
.tag.semantic { color: var(--semantic); }
.tag.episodic { color: var(--episodic); }
.tag.recency { color: var(--recency); }
.tag.user_profile { color: var(--user_profile); }
.tag.notes { color: var(--notes); }
.tag.skill { color: var(--skill); }
.tag.tools { color: var(--tools); }

.actions {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-top: auto;
}
.actions button {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
  padding: 5px 14px;
  font-family: var(--mono);
  font-weight: 500;
  font-size: 11px;
  letter-spacing: 0.1em;
  cursor: pointer;
  text-transform: uppercase;
  transition: color 0.15s, border-color 0.15s, background 0.15s, box-shadow 0.15s;
}
.actions button:hover {
  color: var(--claw);
  border-color: var(--claw);
  box-shadow: 0 0 0 1px rgba(255, 91, 44, 0.2);
}
.actions button.primary {
  color: var(--claw);
  border-color: var(--claw);
}
.actions button.primary:hover { background: var(--claw); color: var(--bg-deep); }
.actions button.danger:hover {
  color: var(--danger);
  border-color: var(--danger);
  box-shadow: 0 0 0 1px rgba(255, 69, 69, 0.2);
}
.actions button.confirm {
  color: var(--bg-deep);
  background: var(--danger);
  border-color: var(--danger);
  animation: pulse 0.9s ease-in-out infinite alternate;
}
.actions .hint { color: var(--dim); font-size: 11px; margin-left: 6px; }

.empty {
  text-align: center;
  padding: 64px 0;
  color: var(--muted);
}
.empty .crab {
  margin: 0 0 16px;
  color: var(--dim);
  font-size: 12px;
  line-height: 1.25;
  white-space: pre;
  user-select: none;
}
.empty .crab b { color: var(--claw); font-weight: 400; }

.status {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  border-top: 1px solid var(--border);
  background: color-mix(in srgb, var(--bg) 80%, transparent);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  padding: 8px 24px;
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.04em;
  z-index: 10;
}
.status .sep { color: var(--dim); margin: 0 10px; }
.status .ok::before { content: "\25cf "; color: var(--success); text-shadow: 0 0 8px rgba(127, 209, 122, 0.8); }
.status .err::before { content: "\25cf "; color: var(--danger); text-shadow: 0 0 8px rgba(255, 69, 69, 0.8); }
.status .warn::before { content: "\25cf "; color: var(--recency); text-shadow: 0 0 8px rgba(240, 185, 66, 0.8); }
.status .stat { color: var(--text); }

.spinner {
  display: inline-block;
  width: 10px;
  height: 10px;
  border: 1px solid var(--claw);
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
}

.toast-stack {
  position: fixed;
  top: 64px;
  right: 18px;
  z-index: 300;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}
.toast {
  background: var(--panel-3);
  border: 1px solid var(--border-hot);
  border-left: 2px solid var(--success);
  padding: 9px 14px;
  font-size: 12px;
  color: var(--text);
  box-shadow: 0 14px 40px -12px rgba(0, 0, 0, 0.8);
  animation: toast-in 0.2s ease-out both;
}
.toast.err { border-left-color: var(--danger); }

.overlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(6, 7, 8, 0.6);
  backdrop-filter: blur(5px);
  -webkit-backdrop-filter: blur(5px);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 14vh;
}
.overlay[hidden] { display: none; }
.overlay-box {
  background: linear-gradient(180deg, var(--panel-3), var(--panel-2));
  border: 1px solid var(--border-hot);
  box-shadow: 0 40px 120px -30px rgba(0, 0, 0, 0.95);
  width: min(520px, 92vw);
  position: relative;
  animation: pop 0.16s ease-out both;
}
.overlay-box::before {
  content: "";
  position: absolute;
  top: -1px;
  left: -1px;
  width: 18px;
  height: 18px;
  border-top: 2px solid var(--claw);
  border-left: 2px solid var(--claw);
  pointer-events: none;
}
.palette input {
  width: 100%;
  background: transparent;
  border: 0;
  border-bottom: 1px solid var(--border);
  padding: 14px 16px;
  color: var(--bright);
  font-family: var(--mono);
  font-size: 14px;
  outline: none;
}
.palette input::placeholder { color: var(--dim); }
.palette-list { max-height: 320px; overflow-y: auto; padding: 6px; }
.palette-item {
  padding: 9px 12px;
  color: var(--muted);
  cursor: pointer;
  font-size: 12px;
  letter-spacing: 0.04em;
}
.palette-item.sel, .palette-item:hover {
  background: var(--panel);
  color: var(--claw);
  box-shadow: inset 2px 0 0 var(--claw);
}
.palette-empty { padding: 14px; color: var(--dim); font-size: 12px; }
.cheat { padding: 18px 20px; }
.cheat h3 {
  margin: 0 0 14px;
  font-family: var(--display);
  font-size: 12px;
  color: var(--claw);
  text-transform: uppercase;
  letter-spacing: 0.14em;
}
.cheat-grid {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 10px 18px;
  font-size: 12px;
  color: var(--muted);
  align-items: center;
}
kbd {
  display: inline-block;
  border: 1px solid var(--border-hot);
  background: var(--bg-deep);
  padding: 1px 6px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text);
  border-radius: 3px;
  box-shadow: 0 2px 0 rgba(0, 0, 0, 0.4);
}

@media (max-width: 900px) {
  .filterbar { grid-template-columns: 1fr 1fr; }
  .masthead { padding: 0 14px; }
  .content { padding: 14px; }
  .mrow-head { grid-template-columns: 90px 1fr; }
  .mrow-mini { grid-column: 1 / -1; }
  .mrow-detail { grid-template-columns: 1fr; }
  .meta { border-right: 0; border-bottom: 1px solid var(--border); }
}
</style>
</head>

<body>
<div class="app" x-data="memoryApp()" x-init="init()">

<div class="masthead">
  <span class="mark">crabgent</span>
  <div class="right">
    <span x-show="loading" class="spinner"></span>
    <a class="nav active" href="/admin" aria-current="page">memory</a>
    <a class="nav" href="/admin/relations">relations</a>
    <a class="nav" href="/admin/cron">cron</a>
    <a class="nav" href="/admin/sessions">sessions</a>
    <a class="nav" href="/admin/voice">voice</a>
    <a class="nav logout" href="/admin/logout">logout</a>
  </div>
</div>

<form class="filterbar" @submit.prevent="load()">
  <div class="field q-wrap" style="grid-column: span 2;">
    <label>fts query</label>
    <input type="text" x-model="filters.q" @input.debounce.400ms="load()" placeholder="type to search across all memories...">
    <span class="q-hint">/</span>
  </div>
  <div class="field">
    <label>class</label>
    <select x-model="filters.class" @change="load()">
      <option value="">all</option>
      <option value="semantic">semantic</option>
      <option value="episodic">episodic</option>
      <option value="recency">recency</option>
      <option value="user_profile">user_profile</option>
      <option value="notes">notes</option>
      <option value="skill">skill</option>
      <option value="tools">tools</option>
    </select>
  </div>
  <div class="field">
    <label>agent</label>
    <select x-model="filters.agent" @change="load()">
      <option value="">all</option>
      <template x-for="v in facets.agents" :key="v"><option :value="v" x-text="v"></option></template>
    </select>
  </div>
  <div class="field">
    <label>owner</label>
    <input type="text" x-model="filters.owner" placeholder="any" @input.debounce.500ms="load()">
  </div>
  <div class="field">
    <label>channel</label>
    <select x-model="filters.channel" @change="load()">
      <option value="">all</option>
      <template x-for="v in facets.channels" :key="v"><option :value="v" x-text="v"></option></template>
    </select>
  </div>
  <div class="field">
    <label>kind</label>
    <select x-model="filters.kind" @change="load()">
      <option value="">all</option>
      <template x-for="v in facets.kinds" :key="v"><option :value="v" x-text="v"></option></template>
    </select>

  <button type="button" class="reset" @click="reset()">reset</button>
</form>

<div class="content">
  <div class="listmeta">
    <span class="count"><b x-text="memories.length"></b>&nbsp;entries</span>
    <template x-for="c in activeChips()" :key="c.key">
      <button type="button" class="chip" @click="clearFilter(c.key)" :title="'remove filter ' + c.key">
        <span x-text="c.key + '=' + c.value"></span><span class="x">&times;</span>
      </button>
    </template>
    <span x-show="activeChips().length > 1" class="chip" style="border-style: dashed;" @click="reset()">clear all</span>
  </div>

  <template x-if="loading && memories.length === 0">
    <div>
      <div class="skel"></div>
      <div class="skel"></div>
      <div class="skel"></div>
      <div class="skel"></div>
    </div>
  </template>

  <template x-if="!loading && memories.length === 0">
    <div class="empty">
      <pre class="crab" aria-hidden="true">   _~^~^~_
<b>\) /</b>  o o  <b>\ (/</b>
  '_   -   _'
  / '-----' \</pre>
      no memories in scope. widen filters or clear the search field.
    </div>
  </template>

  <template x-for="m in memories" :key="m.id">
    <div class="mrow" :class="(m.class || '') + (m.expanded ? ' open' : '') + (m.editing ? ' editing' : '')">
      <div class="mrow-head" @click="toggle(m)">
        <span class="tag" :class="m.class || ''" x-text="m.class || 'none'"></span>
        <div class="mrow-excerpt" x-text="m.body"></div>
        <div class="mrow-mini">
          <span class="who" x-text="m.scope.agent || m.scope.owner || ''"></span>
          <span :title="fmtDate(m.updated_at)" x-text="fmtRel(m.updated_at)"></span>
          <span class="chev">&#x276f;</span>
        </div>
      </div>
      <div class="mrow-detail" x-show="m.expanded" x-collapse.duration.150ms>
        <div class="meta">
          <div class="id">
            <span class="short" x-text="m.id.slice(0, 8)"></span><span class="tail" x-text="m.id.slice(8)"></span>
          </div>
          <div class="row" x-show="m.importance !== null && m.importance !== undefined">
            <span class="k">importance</span>
            <span class="v" x-text="m.importance !== null && m.importance !== undefined ? m.importance.toFixed(2) : '—'"></span>
          </div>
          <div class="row">
            <span class="k">owner</span>
            <span class="v" x-text="m.scope.owner || '—'"></span>
          </div>
          <div class="row">
            <span class="k">agent</span>
            <span class="v" x-text="m.scope.agent || '—'"></span>
          </div>
          <div class="row">
            <span class="k">channel</span>
            <span class="v" x-text="m.scope.channel || '—'"></span>
          </div>
          <div class="row">
            <span class="k">kind</span>
            <span class="v" x-text="m.scope.kind || '—'"></span>
          </div>
          <div class="row">
            <span class="k">created</span>
            <span class="v" :title="fmtDate(m.created_at)" x-text="fmtRel(m.created_at)"></span>
          </div>
          <div class="row">
            <span class="k">updated</span>
            <span class="v" :title="fmtDate(m.updated_at)" x-text="fmtRel(m.updated_at)"></span>
          </div>
          <div class="row" x-show="m.expires_at">
            <span class="k">expires</span>
            <span class="v" :title="fmtDate(m.expires_at)" x-text="fmtRel(m.expires_at)"></span>
          </div>
          <div class="row" x-show="m.archived_at">
            <span class="k">archived</span>
            <span class="v" :title="fmtDate(m.archived_at)" x-text="fmtRel(m.archived_at)"></span>
          </div>
          <div class="scope-line" x-show="m.scope.conv">
            <span class="k">conv</span>
            <span class="v" x-text="m.scope.conv"></span>
          </div>
        </div>
        <div class="body">
          <template x-if="!m.editing">
            <div class="text" x-text="m.body"></div>
          </template>
          <template x-if="m.editing">
            <textarea x-model="m.draft" x-init="$el.focus()" @keydown.escape="cancelEdit(m)" @keydown.meta.enter="save(m)" @keydown.ctrl.enter="save(m)"></textarea>
          </template>
          <div class="actions">
            <template x-if="!m.editing">
              <button @click.stop="startEdit(m)">edit</button>
            </template>
            <template x-if="!m.editing">
              <button @click.stop="copyBody(m)" x-text="copiedId === m.id ? 'copied' : 'copy'"></button>
            </template>
            <template x-if="m.editing">
              <button class="primary" @click="save(m)">save</button>
            </template>
            <template x-if="m.editing">
              <button @click="cancelEdit(m)">cancel</button>
            </template>
            <template x-if="!m.editing && m.confirmDelete">
              <button class="confirm" @click.stop="doDelete(m)">confirm delete</button>
            </template>
            <template x-if="!m.editing && !m.confirmDelete">
              <button class="danger" @click.stop="askDelete(m)">delete</button>
            </template>
            <span x-show="m.editing" class="hint">cmd+enter = save · esc = cancel</span>
          </div>
        </div>
      </div>
    </div>
  </template>
</div>

<div class="status">
  <div>
    <span :class="status.kind" x-text="status.text"></span>
  </div>
  <div>
    <span class="stat" x-text="memories.length"></span> entries<span class="sep">::</span>
    <span x-text="filterSummary()"></span><span class="sep">::</span>
    <span class="stat" x-text="clock"></span><span class="sep">::</span>
    local@crabgent
  </div>
</div>

<div class="toast-stack" aria-live="polite">
  <template x-for="t in toasts" :key="t.id">
    <div class="toast" :class="t.kind" x-text="t.text"></div>
  </template>
</div>

</div>

<div id="cgPalette" class="overlay" hidden>
  <div class="overlay-box palette">
    <input id="cgPaletteInput" type="text" placeholder="command or page..." autocomplete="off" spellcheck="false">
    <div id="cgPaletteList" class="palette-list"></div>
  </div>
</div>
<div id="cgCheat" class="overlay" hidden>
  <div class="overlay-box cheat">
    <h3>keyboard</h3>
    <div class="cheat-grid">
      <span><kbd>cmd</kbd>+<kbd>k</kbd></span><span>command palette</span>
      <span><kbd>/</kbd></span><span>focus search</span>
      <span><kbd>g</kbd> <kbd>m</kbd>/<kbd>r</kbd>/<kbd>c</kbd>/<kbd>s</kbd>/<kbd>v</kbd></span><span>go to memory / relations / cron / sessions / voice</span>
      <span><kbd>?</kbd></span><span>this help</span>
      <span><kbd>esc</kbd></span><span>close overlays</span>
    </div>
  </div>
</div>

<script>
function fmtRel(ts) {
  if (!ts) return '-';
  const d = new Date(ts);
  if (isNaN(d.getTime())) return ts;
  const diff = d.getTime() - Date.now();
  const abs = Math.abs(diff);
  const units = [
    [31536000000, 'y'], [2592000000, 'mo'], [604800000, 'w'],
    [86400000, 'd'], [3600000, 'h'], [60000, 'm'],
  ];
  for (const [ms, label] of units) {
    if (abs >= ms) {
      const v = Math.round(abs / ms);
      return diff < 0 ? v + label + ' ago' : 'in ' + v + label;
    }
  }
  return 'now';
}

function memoryApp() {
  return {
    filters: { q: '', class: '', agent: '', owner: '', channel: '', conv: '', kind: '', limit: '50' },
    memories: [],
    facets: { agents: [], channels: [], kinds: [], classes: [] },
    loading: false,
    status: { text: 'ready', kind: 'ok' },
    clock: '--:--:--',
    toasts: [],
    _toastId: 0,
    _loadSeq: 0,
    copiedId: null,
    init() {
      this.tick();
      setInterval(() => this.tick(), 1000);
      this.loadFacets();
      this.load();
    },
    async loadFacets() {
      try {
        const r = await fetch('/admin/api/facets', { credentials: 'same-origin' });
        if (r.ok) this.facets = await r.json();
      } catch (e) { /* ignore */ }
    },
    tick() {
      const d = new Date();
      const pad = n => String(n).padStart(2, '0');
      this.clock = pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
    },
    reset() {
      this.filters = { q: '', class: '', agent: '', owner: '', channel: '', conv: '', kind: '', limit: '50' };
      this.load();
    },
    activeChips() {
      return Object.entries(this.filters)
        .filter(([k, v]) => v && k !== 'limit')
        .map(([k, v]) => ({ key: k, value: v }));
    },
    clearFilter(key) {
      this.filters[key] = '';
      this.load();
    },
    filterSummary() {
      const active = Object.entries(this.filters)
        .filter(([k, v]) => v && k !== 'limit')
        .map(([k, v]) => k + '=' + v)
        .join(' ');
      return active || 'global scope';
    },
    toast(text, kind) {
      const id = ++this._toastId;
      this.toasts.push({ id, text, kind: kind || 'ok' });
      setTimeout(() => { this.toasts = this.toasts.filter(t => t.id !== id); }, 3200);
    },
    fmtRel,
    toggle(m) { m.expanded = !m.expanded; },
    async copyBody(m) {
      try {
        await navigator.clipboard.writeText(m.body);
        this.copiedId = m.id;
        setTimeout(() => { if (this.copiedId === m.id) this.copiedId = null; }, 1500);
      } catch (e) {
        this.toast('clipboard blocked', 'err');
      }
    },
    async load() {
      const seq = ++this._loadSeq;
      this.loading = true;
      this.status = { text: 'fetching ...', kind: 'warn' };
      const params = new URLSearchParams();
      for (const [k, v] of Object.entries(this.filters)) {
        if (v !== '' && v !== null && v !== undefined) params.set(k, v);
      }
      try {
        const r = await fetch('/admin/api/memories?' + params.toString(), { credentials: 'include' });
        if (seq !== this._loadSeq) return;
        if (r.status === 401) { window.location.href = '/admin/login'; return; }
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const data = await r.json();
        this.memories = (data.memories || []).map(m => ({
          ...m,
          expanded: false,
          editing: false,
          draft: '',
          confirmDelete: false,
        }));
        this.status = { text: 'loaded ' + this.memories.length + ' entries', kind: 'ok' };
      } catch (e) {
        if (seq !== this._loadSeq) return;
        this.status = { text: 'load failed :: ' + e.message, kind: 'err' };
      } finally {
        if (seq === this._loadSeq) this.loading = false;
      }
    },
    startEdit(m) { m.draft = m.body; m.editing = true; m.expanded = true; },
    cancelEdit(m) { m.editing = false; m.draft = ''; },
    async save(m) {
      this.status = { text: 'saving ' + m.id.slice(0, 8) + ' ...', kind: 'warn' };
      try {
        const r = await fetch('/admin/api/memories/' + encodeURIComponent(m.id), {
          method: 'PUT',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ body: m.draft }),
        });
        if (r.status === 401) { window.location.href = '/admin/login'; return; }
        if (!r.ok) {
          const txt = await r.text().catch(() => '');
          throw new Error('HTTP ' + r.status + (txt ? ' :: ' + txt : ''));
        }
        m.body = m.draft;
        m.editing = false;
        m.updated_at = new Date().toISOString();
        this.status = { text: 'saved :: ' + m.id.slice(0, 8), kind: 'ok' };
        this.toast('saved ' + m.id.slice(0, 8));
      } catch (e) {
        this.status = { text: 'save failed :: ' + e.message, kind: 'err' };
        this.toast('save failed: ' + e.message, 'err');
      }
    },
    askDelete(m) {
      m.confirmDelete = true;
      setTimeout(() => { m.confirmDelete = false; }, 4000);
    },
    async doDelete(m) {
      this.status = { text: 'deleting ' + m.id.slice(0, 8) + ' ...', kind: 'warn' };
      try {
        const r = await fetch('/admin/api/memories/' + encodeURIComponent(m.id), {
          method: 'DELETE',
          credentials: 'include',
        });
        if (r.status === 401) { window.location.href = '/admin/login'; return; }
        if (!r.ok) {
          const txt = await r.text().catch(() => '');
          throw new Error('HTTP ' + r.status + (txt ? ' :: ' + txt : ''));
        }
        this.memories = this.memories.filter(x => x.id !== m.id);
        this.status = { text: 'deleted :: ' + m.id.slice(0, 8), kind: 'ok' };
        this.toast('deleted ' + m.id.slice(0, 8));
      } catch (e) {
        this.status = { text: 'delete failed :: ' + e.message, kind: 'err' };
        this.toast('delete failed: ' + e.message, 'err');
      }
    },
    fmtDate(s) {
      if (!s) return '—';
      try {
        const d = new Date(s);
        const pad = n => String(n).padStart(2, '0');
        return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate())
             + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
      } catch (e) { return s; }
    },
  };
}
</script>
<script>
(() => {
  const KEYMAP = { m: '/admin', r: '/admin/relations', c: '/admin/cron', s: '/admin/sessions', v: '/admin/voice' };
  const NAV = [
    ['memory', '/admin'], ['relations', '/admin/relations'], ['cron', '/admin/cron'],
    ['sessions', '/admin/sessions'], ['voice', '/admin/voice'],
  ];
  const pal = document.getElementById('cgPalette');
  const input = document.getElementById('cgPaletteInput');
  const list = document.getElementById('cgPaletteList');
  const cheat = document.getElementById('cgCheat');
  let items = [];
  let sel = 0;
  let goPending = 0;

  function actions() {
    return NAV.map(([label, href]) => ({ label: 'go to ' + label, run: () => { location.href = href; } }))
      .concat([{ label: 'focus search', run: focusSearch }])
      .concat(window.crabgentActions || []);
  }
  function focusSearch() {
    const el = document.querySelector('.filterbar input[type="text"], #manualText');
    if (el) { el.focus(); if (el.select) el.select(); }
  }
  function render() {
    const q = input.value.toLowerCase();
    items = actions().filter(a => a.label.toLowerCase().includes(q));
    if (sel >= items.length) sel = Math.max(0, items.length - 1);
    list.textContent = '';
    if (!items.length) {
      const div = document.createElement('div');
      div.className = 'palette-empty';
      div.textContent = 'no match';
      list.appendChild(div);
      return;
    }
    items.forEach((a, i) => {
      const div = document.createElement('div');
      div.className = 'palette-item' + (i === sel ? ' sel' : '');
      div.textContent = a.label;
      div.addEventListener('click', () => { closeAll(); a.run(); });
      list.appendChild(div);
    });
  }
  function openPal() { pal.hidden = false; input.value = ''; sel = 0; render(); input.focus(); }
  function closeAll() { pal.hidden = true; cheat.hidden = true; }
  input.addEventListener('input', () => { sel = 0; render(); });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowDown') { e.preventDefault(); sel = Math.min(items.length - 1, sel + 1); render(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); sel = Math.max(0, sel - 1); render(); }
    else if (e.key === 'Enter') { const a = items[sel]; if (a) { closeAll(); a.run(); } }
  });
  pal.addEventListener('click', (e) => { if (e.target === pal) closeAll(); });
  cheat.addEventListener('click', (e) => { if (e.target === cheat) closeAll(); });
  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
      e.preventDefault();
      if (pal.hidden) openPal(); else closeAll();
      return;
    }
    if (e.key === 'Escape') { closeAll(); return; }
    const t = e.target;
    if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.tagName === 'SELECT' || t.isContentEditable)) return;
    if (e.key === '/') { e.preventDefault(); focusSearch(); return; }
    if (e.key === '?') { cheat.hidden = !cheat.hidden; return; }
    if (e.key === 'g') { goPending = Date.now(); return; }
    if (goPending && Date.now() - goPending < 900 && KEYMAP[e.key]) { location.href = KEYMAP[e.key]; }
    goPending = 0;
  });
})();
</script>
